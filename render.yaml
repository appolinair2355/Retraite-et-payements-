services:
  - type: web
    name: baccarat-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PORT
        value: 10000
      - key: BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TELETHON_API_ID
        sync: false
      - key: TELETHON_API_HASH
        sync: false
      - key: TELETHON_SESSION
        sync: false
      - key: ADMINS
        sync: false
